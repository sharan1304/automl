apiVersion: apps/v1
kind: Deployment

metadata:
  name: automl-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: automl

  template:
    metadata:
      labels:
        app: automl

    spec:
      containers:
      - name: automl-container
        image: automl-ai
        imagePullPolicy: Never

        ports:
        - containerPort: 8501